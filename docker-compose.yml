services:
  keycloak-db:
    image: postgres:15
    container_name: uconnect-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - uconnect-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    restart: unless-stopped
    container_name: uconnect-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_FEATURES: declarative-user-profile
      KC_SPI_THEME_STATIC_MAX_AGE: -1
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_USER_EVENTS: keycloak-user-events
    volumes:
      - ./keycloak/themes/ucnnct:/opt/keycloak/themes/ucnnct
      - ./keycloak-event-listener/target/keycloak-event-listener-1.0.0.jar:/opt/keycloak/providers/keycloak-event-listener.jar
    ports:
      - "8081:8080"
    depends_on:
      - keycloak-db
      - kafka
    networks:
      - uconnect-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: uconnect-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: uconnect-kafka-cluster-001
    ports:
      - "9092:9092"
    networks:
      - uconnect-network

  user-db:
    image: postgres:15
    container_name: uconnect-user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: userservice
      POSTGRES_PASSWORD: password
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - uconnect-network

  user-service:
    build: ./user-service
    container_name: uconnect-user-service
    restart: unless-stopped
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: userdb
      DB_USER: userservice
      DB_PASSWORD: password
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_JWKSET_URI: http://keycloak:8080/realms/ucnnct/protocol/openid-connect/certs
    ports:
      - "8082:8082"
    depends_on:
      - user-db
      - kafka
      - keycloak
    networks:
      - uconnect-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uconnect-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uconnect.cc
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - keycloak-db
      - user-db
    networks:
      - uconnect-network

  minio:
    image: minio/minio:latest
    container_name: uconnect-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - uconnect-network

  minio-init:
    image: minio/mc:latest
    container_name: uconnect-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/uconnect-media;
      mc anonymous set download local/uconnect-media;
      exit 0;
      "
    networks:
      - uconnect-network

  media-service:
    build: ./media-service
    container_name: uconnect-media-service
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: uconnect-media
      MINIO_PUBLIC_URL: http://localhost:9000
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_JWKSET_URI: http://keycloak:8080/realms/ucnnct/protocol/openid-connect/certs
    ports:
      - "8083:8083"
    depends_on:
      - minio
      - keycloak
    networks:
      - uconnect-network

volumes:
  keycloak_data:
  user_data:
  minio_data:

networks:
  uconnect-network:
    driver: bridge
