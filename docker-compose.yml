services:
  traefik:
    image: traefik:v3.6
    container_name: uconnect-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "${APP_PORT}:80"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - uconnect-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: uconnect-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: uconnect-kafka-cluster-001
    ports:
      - "9092:9092"
    networks:
      - uconnect-network

  keycloak-db:
    image: postgres:15
    container_name: uconnect-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - uconnect-network

  keycloak:
    build: ./keycloak
    container_name: uconnect-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-ucnnct.json:/opt/keycloak/data/import/realm-ucnnct.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_FEATURES: declarative-user-profile
      KC_SPI_THEME_STATIC_MAX_AGE: -1
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: http://localhost:${KEYCLOAK_PORT}
      KC_HTTP_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_USER_EVENTS: keycloak-user-events
    ports:
      - "${KEYCLOAK_PORT}:8080"
    depends_on:
      - keycloak-db
      - kafka
    networks:
      - uconnect-network

  user-db:
    image: postgres:15
    container_name: uconnect-user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - uconnect-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uconnect-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uconnect.cc
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - keycloak-db
      - user-db
    networks:
      - uconnect-network

  minio:
    image: minio/minio:latest
    container_name: uconnect-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT}:9001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-public.rule=PathPrefix(`/uconnect-media`)"
      - "traefik.http.routers.minio-public.entrypoints=web"
      - "traefik.http.services.minio-public.loadbalancer.server.port=9000"
    volumes:
      - minio_data:/data
    networks:
      - uconnect-network

  minio-init:
    image: minio/mc:latest
    container_name: uconnect-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/uconnect-media;
      mc anonymous set download local/uconnect-media;
      exit 0;
      "
    networks:
      - uconnect-network

  # --- DATABASES ---
  group-db:
    image: postgres:15
    container_name: uconnect-group-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GROUP_DB_NAME}
      POSTGRES_USER: ${GROUP_DB_USER}
      POSTGRES_PASSWORD: ${GROUP_DB_PASSWORD}
    volumes:
      - group_data:/var/lib/postgresql/data
    networks:
      - uconnect-network

  mongodb:
    image: mongo:7
    container_name: uconnect-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: chatdb
    volumes:
      - mongo_data:/data/db
    networks:
      - uconnect-network

  # --- BACKEND SERVICES ---
  user-service:
    build: ./user-service
    container_name: uconnect-user-service
    restart: unless-stopped
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_NAME: ${USER_DB_NAME}
      DB_USER: ${USER_DB_USER}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_JWKSET_URI: http://keycloak:8080/realms/ucnnct/protocol/openid-connect/certs
    depends_on:
      - user-db
      - kafka
      - keycloak
    networks:
      - uconnect-network

  media-service:
    build: ./media-service
    container_name: uconnect-media-service
    restart: unless-stopped
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: uconnect-media
      MINIO_PUBLIC_URL: http://localhost
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_JWKSET_URI: http://keycloak:8080/realms/ucnnct/protocol/openid-connect/certs
    depends_on:
      - minio
      - keycloak
    networks:
      - uconnect-network

  group-service:
    build: ./group-service
    container_name: uconnect-group-service
    restart: unless-stopped
    environment:
      DB_HOST: group-db
      DB_PORT: 5432
      DB_NAME: ${GROUP_DB_NAME}
      DB_USER: ${GROUP_DB_USER}
      DB_PASSWORD: ${GROUP_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_JWKSET_URI: http://keycloak:8080/realms/ucnnct/protocol/openid-connect/certs
    depends_on:
      - group-db
      - kafka
      - keycloak
    networks:
      - uconnect-network

  chat-service:
    build: ./chat-service
    container_name: uconnect-chat-service
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/chatdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_JWKSET_URI: http://keycloak:8080/realms/ucnnct/protocol/openid-connect/certs
    depends_on:
      - mongodb
      - kafka
      - keycloak
    networks:
      - uconnect-network

  bff:
    build: ./bff
    container_name: uconnect-bff
    restart: unless-stopped
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/ucnnct
      KEYCLOAK_EXTERNAL_URI: http://localhost:${KEYCLOAK_PORT}/realms/ucnnct
      BFF_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      USER_SERVICE_URL: http://user-service:8082
      MEDIA_SERVICE_URL: http://media-service:8083
      # GROUP_SERVICE_URL: http://group-service:8085
      # CHAT_SERVICE_URL: http://chat-service:8084
      REDIRECT_URI: http://localhost:${APP_PORT}/login/oauth2/code/keycloak
      LOGOUT_REDIRECT_URI: http://localhost:${APP_PORT}/
      SESSION_SECRET: ${SESSION_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff.rule=PathPrefix(`/api`) || PathPrefix(`/bff`) || PathPrefix(`/login/oauth2`)"
      - "traefik.http.routers.bff.entrypoints=web"
      - "traefik.http.services.bff.loadbalancer.server.port=3001"
    depends_on:
      - user-service
      - media-service
      - keycloak
    networks:
      - uconnect-network

  web-frontend:
    build: ./web-frontend
    container_name: uconnect-web-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web-frontend.entrypoints=web"
      - "traefik.http.routers.web-frontend.priority=1"
      - "traefik.http.services.web-frontend.loadbalancer.server.port=80"
    depends_on:
      - bff
    networks:
      - uconnect-network

volumes:
  keycloak_data:
  user_data:
  minio_data:
  group_data:
  mongo_data:

networks:
  uconnect-network:
    driver: bridge