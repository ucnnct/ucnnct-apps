spring:
  application:
    name: group-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:groupdb}
    username: ${DB_USER:groupservice}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: group-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "cc.uconnect.kafka.event"
        spring.json.use.type.headers: false
        spring.json.value.default.type: cc.uconnect.kafka.event.GroupResolveEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKSET_URI:http://localhost:8882/realms/ucnnct/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8882/realms/ucnnct}

server:
  port: 8085

app:
  kafka:
    topics:
      group-resolve: ${WS_KAFKA_TOPIC_GROUP_RESOLVE:group.message}
      group-resolve-legacy: ${GROUP_LEGACY_RESOLVE_TOPIC:group.resolve}
      group-resolved: ${WS_KAFKA_TOPIC_GROUP_RESOLVED:group.resolved}
