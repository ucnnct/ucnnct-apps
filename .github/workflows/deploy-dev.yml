name: Deploy DEV (main) - test, build once, update GitOps

on:
  push:
    branches: ["main"]
    paths:
      - "auth-service/**"
      - "user-service/**"
      - "chat-service/**"
      - "ws-manager/**"
      - "notification-service/**"
      - "media-service/**"
      - "web-frontend/**"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_PREFIX: uconnect

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      chat: ${{ steps.filter.outputs.chat }}
      ws: ${{ steps.filter.outputs.ws }}
      notif: ${{ steps.filter.outputs.notif }}
      media: ${{ steps.filter.outputs.media }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:  ["auth-service/**"]
            user:  ["user-service/**"]
            chat:  ["chat-service/**"]
            ws:    ["ws-manager/**"]
            notif: ["notification-service/**"]
            media: ["media-service/**"]
            web:   ["web-frontend/**"]

  tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      # Java tests (only if any backend changed)
      - uses: actions/setup-java@v4
        if: needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.user == 'true' || needs.detect-changes.outputs.chat == 'true' || needs.detect-changes.outputs.ws == 'true' || needs.detect-changes.outputs.notif == 'true' || needs.detect-changes.outputs.media == 'true'
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Spring tests (changed services only)
        if: needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.user == 'true' || needs.detect-changes.outputs.chat == 'true' || needs.detect-changes.outputs.ws == 'true' || needs.detect-changes.outputs.notif == 'true' || needs.detect-changes.outputs.media == 'true'
        shell: bash
        run: |
          set -e
          run_maven_tests () {
            svc="$1"
            if [ -f "$svc/mvnw" ]; then
              chmod +x "$svc/mvnw"
              (cd "$svc" && ./mvnw -q test)
            elif [ -f "$svc/pom.xml" ]; then
              (cd "$svc" && mvn -q test)
            fi
          }

          if [[ "${{ needs.detect-changes.outputs.auth }}" == "true" ]]; then run_maven_tests "auth-service"; fi
          if [[ "${{ needs.detect-changes.outputs.user }}" == "true" ]]; then run_maven_tests "user-service"; fi
          if [[ "${{ needs.detect-changes.outputs.chat }}" == "true" ]]; then run_maven_tests "chat-service"; fi
          if [[ "${{ needs.detect-changes.outputs.ws }}" == "true" ]]; then run_maven_tests "ws-manager"; fi
          if [[ "${{ needs.detect-changes.outputs.notif }}" == "true" ]]; then run_maven_tests "notification-service"; fi
          if [[ "${{ needs.detect-changes.outputs.media }}" == "true" ]]; then run_maven_tests "media-service"; fi

      # React tests (only if web changed)
      - uses: actions/setup-node@v4
        if: needs.detect-changes.outputs.web == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json

      - name: React tests
        if: needs.detect-changes.outputs.web == 'true'
        working-directory: web-frontend
        run: |
          npm ci
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
            npm test -- --runInBand
          else
            echo "No test script defined for web-frontend, skipping tests."
          fi

  build-push-and-update-gitops:
    runs-on: ubuntu-latest
    needs: [detect-changes, tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute semver tag + image namespace
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "OWNER=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

          BASE_VERSION="$(git tag --list | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/^v//' | sort -V | tail -n 1 || true)"
          if [[ -z "$BASE_VERSION" ]]; then
            BASE_VERSION="0.0.0"
          fi

          PR_BRANCH=""
          PR_JSON="$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" || true)"
          if [[ -z "$PR_JSON" ]]; then
            PR_JSON="[]"
          fi
          export PR_JSON

          PR_BRANCH="$(python3 - <<'PY'
          import json, os
          data = json.loads(os.environ.get("PR_JSON", "[]"))
          print(data[0]["head"]["ref"] if data else "")
          PY
          )"

          BRANCH_LC="$(echo "$PR_BRANCH" | tr '[:upper:]' '[:lower:]')"
          MSG_LC="$(echo "${{ github.event.head_commit.message }}" | tr '[:upper:]' '[:lower:]')"

          BUMP="patch"
          if [[ "$BRANCH_LC" =~ (feat|feature|fit) ]]; then
            BUMP="minor"
          elif [[ "$BRANCH_LC" =~ (fix|hotfix|bug|corr|correction) ]]; then
            BUMP="patch"
          elif [[ "$MSG_LC" =~ (feat|feature|fit) ]]; then
            BUMP="minor"
          elif [[ "$MSG_LC" =~ (fix|hotfix|bug|corr|correction) ]]; then
            BUMP="patch"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
          if [[ "$BUMP" == "minor" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          SEMVER_TAG="$MAJOR.$MINOR.$PATCH"
          echo "SEMVER_TAG=$SEMVER_TAG" >> $GITHUB_ENV
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & push only changed
      - name: Build & push auth-service
        if: needs.detect-changes.outputs.auth == 'true'
        uses: docker/build-push-action@v6
        with:
          context: auth-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-auth-service:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-auth-service:latest

      - name: Build & push user-service
        if: needs.detect-changes.outputs.user == 'true'
        uses: docker/build-push-action@v6
        with:
          context: user-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-user-service:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-user-service:latest

      - name: Build & push chat-service
        if: needs.detect-changes.outputs.chat == 'true'
        uses: docker/build-push-action@v6
        with:
          context: chat-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-chat-service:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-chat-service:latest

      - name: Build & push ws-manager
        if: needs.detect-changes.outputs.ws == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ws-manager
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-ws-manager:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-ws-manager:latest

      - name: Build & push notification-service
        if: needs.detect-changes.outputs.notif == 'true'
        uses: docker/build-push-action@v6
        with:
          context: notification-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-notification-service:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-notification-service:latest

      - name: Build & push media-service
        if: needs.detect-changes.outputs.media == 'true'
        uses: docker/build-push-action@v6
        with:
          context: media-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-media-service:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-media-service:latest

      - name: Build & push web-frontend
        if: needs.detect-changes.outputs.web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: web-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-web-frontend:${{ env.SEMVER_TAG }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-web-frontend:latest
          build-args: |
            VITE_MODE=dev

      - name: Tag release
        if: always()
        shell: bash
        run: |
          set -e
          TAG="v${SEMVER_TAG}"
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping."
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
