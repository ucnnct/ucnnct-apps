name: Deploy DEV (main) - per-service pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "auth-service/**"
      - "user-service/**"
      - "chat-service/**"
      - "group-service/**"
      - "ws-manager/**"
      - "notification-service/**"
      - "media-service/**"
      - "web-frontend/**"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  IMAGE_PREFIX: uconnect
  HELLO_MESSAGE: Uconnect hello from

jobs:
  detect-changes:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:  ["auth-service/**"]
            user:  ["user-service/**"]
            chat:  ["chat-service/**"]
            group: ["group-service/**"]
            ws:    ["ws-manager/**"]
            notif: ["notification-service/**"]
            media: ["media-service/**"]
            web:   ["web-frontend/**"]
      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          include=()
          if [[ "${{ steps.filter.outputs.auth }}" == "true" ]]; then include+=("{\"service\":\"auth-service\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.user }}" == "true" ]]; then include+=("{\"service\":\"user-service\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.chat }}" == "true" ]]; then include+=("{\"service\":\"chat-service\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.group }}" == "true" ]]; then include+=("{\"service\":\"group-service\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.ws }}" == "true" ]]; then include+=("{\"service\":\"ws-manager\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.notif }}" == "true" ]]; then include+=("{\"service\":\"notification-service\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.media }}" == "true" ]]; then include+=("{\"service\":\"media-service\",\"type\":\"java\"}"); fi
          if [[ "${{ steps.filter.outputs.web }}" == "true" ]]; then include+=("{\"service\":\"web-frontend\",\"type\":\"web\"}"); fi

          if [[ ${#include[@]} -eq 0 ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf -v json '%s,' "${include[@]}"
          json="[${json%,}]"
          echo "matrix={\"include\":$json}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  service-pipeline:
    if: "!contains(github.event.head_commit.message, '[skip ci]') && needs.detect-changes.outputs.has_changes == 'true'"
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        if: matrix.type == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Spring tests
        if: matrix.type == 'java'
        shell: bash
        run: |
          set -e
          svc="${{ matrix.service }}"
          if [ -f "$svc/mvnw" ]; then
            chmod +x "$svc/mvnw"
            (cd "$svc" && ./mvnw -q test)
          elif [ -f "$svc/pom.xml" ]; then
            (cd "$svc" && mvn -q test)
          fi

      - name: Set up Node
        if: matrix.type == 'web'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-frontend/package-lock.json

      - name: Run React tests
        if: matrix.type == 'web'
        working-directory: web-frontend
        run: |
          npm ci
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test?0:1)"; then
            npm test -- --runInBand
          else
            echo "No test script defined for web-frontend, skipping tests."
          fi

      - name: Determine version bump
        id: bump
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUMP="patch"
          MSG_LC="$(echo "${{ github.event.head_commit.message }}" | tr '[:upper:]' '[:lower:]')"

          PR_JSON="$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" || true)"
          if [[ -z "$PR_JSON" ]]; then
            PR_JSON="[]"
          fi
          export PR_JSON

          PR_BRANCH="$(python3 - <<'PY'
          import json, os
          data = json.loads(os.environ.get("PR_JSON", "[]"))
          print(data[0]["head"]["ref"] if data else "")
          PY
          )"

          BRANCH_LC="$(echo "$PR_BRANCH" | tr '[:upper:]' '[:lower:]')"

          if [[ "$BRANCH_LC" =~ (feat|feature|fit) ]] || [[ "$MSG_LC" =~ (feat|feature|fit) ]]; then
            BUMP="minor"
          elif [[ "$BRANCH_LC" =~ (fix|hotfix|bug|corr|correction) ]] || [[ "$MSG_LC" =~ (fix|hotfix|bug|corr|correction) ]]; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: version
        shell: bash
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.bump }}
          SVC: ${{ matrix.service }}
          SVC_TYPE: ${{ matrix.type }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          from pathlib import Path

          bump = os.environ["BUMP_TYPE"]
          svc = os.environ["SVC"]
          svc_type = os.environ["SVC_TYPE"]

          def bump_version(value: str) -> str:
              value = value.strip().lstrip("v")
              base = value.split("-", 1)[0]
              parts = base.split(".")
              if len(parts) != 3:
                  raise RuntimeError(f"Invalid version: {value}")
              major, minor, patch = [int(p) for p in parts]
              if bump == "minor":
                  minor += 1
                  patch = 0
              elif bump == "patch":
                  patch += 1
              return f"{major}.{minor}.{patch}"

          def read_pom_version(path: Path) -> str:
              text = path.read_text(encoding="utf-8")
              parent = re.search(r"<parent>.*?</parent>", text, flags=re.S)
              start = parent.end() if parent else 0
              match = re.search(r"<version>\s*([^<]+)\s*</version>", text[start:])
              if not match:
                  raise RuntimeError(f"Missing version in {path}")
              return match.group(1).strip()

          def write_pom_version(path: Path, new_version: str) -> None:
              text = path.read_text(encoding="utf-8")
              parent = re.search(r"<parent>.*?</parent>", text, flags=re.S)
              start = parent.end() if parent else 0
              match = re.search(r"<version>\s*([^<]+)\s*</version>", text[start:])
              if not match:
                  raise RuntimeError(f"Missing version in {path}")
              before = text[: start + match.start()]
              after = text[start + match.end() :]
              path.write_text(before + f"<version>{new_version}</version>" + after, encoding="utf-8")

          def read_package_version(path: Path) -> str:
              return json.loads(path.read_text(encoding="utf-8"))["version"].strip()

          def write_package_version(path: Path, new_version: str) -> None:
              data = json.loads(path.read_text(encoding="utf-8"))
              data["version"] = new_version
              path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")

          if svc_type == "web":
              path = Path("web-frontend/package.json")
              current = read_package_version(path)
              new_version = bump_version(current)
              write_package_version(path, new_version)
          else:
              path = Path(svc) / "pom.xml"
              current = read_pom_version(path)
              new_version = bump_version(current)
              write_pom_version(path, new_version)

          print(f"version={new_version}")
          PY

      - name: Compute image namespace
        shell: bash
        run: |
          set -euo pipefail
          echo "OWNER=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (java services)
        if: matrix.type == 'java'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-${{ matrix.service }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-${{ matrix.service }}:latest
          build-args: |
            HELLO_MESSAGE=${{ env.HELLO_MESSAGE }}

      - name: Build & push (web-frontend)
        if: matrix.type == 'web'
        uses: docker/build-push-action@v6
        with:
          context: web-frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-web-frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/uconnect-web-frontend:latest
          build-args: |
            VITE_MODE=dev

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ "${{ matrix.type }}" == "web" ]]; then
            git add web-frontend/package.json
          else
            git add "${{ matrix.service }}/pom.xml"
          fi
          if git diff --staged --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(version): bump ${{ matrix.service }} ${{ steps.bump.outputs.bump }} [skip ci]"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 2
          done
          exit 1
