<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification UConnect</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;color:#12263a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #dde3ea;">
          <tr>
            <td style="background:#0d6efd;padding:18px 24px;color:#ffffff;font-size:18px;font-weight:700;">
              UConnect
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 14px;font-size:16px;line-height:1.5;font-weight:600;color:#12263a;">{{headline}}</p>
              <p style="margin:0 0 10px;font-size:14px;line-height:1.5;color:#34495e;">Nouveau message prive</p>
              <div style="margin:0 0 18px;padding:14px;background:#f8fafc;border:1px solid #e8edf3;border-radius:8px;font-size:14px;line-height:1.5;color:#1f2d3d;">
                {{preview}}
              </div>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#6b7c93;">
                Ouvrez UConnect pour consulter votre conversation.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
