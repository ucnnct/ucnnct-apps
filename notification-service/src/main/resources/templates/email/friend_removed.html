<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification UConnect</title>
</head>
<body style="margin:0;padding:0;background:#eef3f8;font-family:Arial,Helvetica,sans-serif;color:#102a43;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #d9e2ec;">
          <tr>
            <td style="padding:18px 22px;background:linear-gradient(90deg,#0d4a7c 0%, #1f8a58 100%);">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <img src="cid:{{logo_cid}}" alt="UConnect" style="display:block;height:44px;max-width:220px;">
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <p style="margin:0 0 12px;font-size:16px;line-height:1.5;font-weight:700;color:#102a43;">{{headline}}</p>
              <p style="margin:0 0 10px;font-size:14px;line-height:1.5;color:#486581;">Mise a jour de relation</p>
              <div style="margin:0 0 18px;padding:14px;background:#f8fbff;border:1px solid #d9e2ec;border-radius:10px;font-size:14px;line-height:1.6;color:#243b53;">
                {{preview}}
              </div>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 16px;">
                <tr>
                  <td style="border-radius:8px;background:#0d4a7c;">
                    <a href="{{app_url}}" style="display:inline-block;padding:11px 18px;font-size:13px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:8px;">{{cta_label}}</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:12px;line-height:1.5;color:#829ab1;">Si le bouton ne fonctionne pas, copiez ce lien dans votre navigateur : {{app_url}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
