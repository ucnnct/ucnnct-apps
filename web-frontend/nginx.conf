server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ^~ /dev/ {
    rewrite ^/dev(/|$)(.*)$ /$2 break;
    try_files $uri $uri/ /index.html;
  }

  location ^~ /staging/ {
    rewrite ^/staging(/|$)(.*)$ /$2 break;
    try_files $uri $uri/ /index.html;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
